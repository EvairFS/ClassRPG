services:
  # Backend API Service
  - type: web
    name: classrpg-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # 👇 Vincula automaticamente a URL do banco de dados que está configurado abaixo
        fromDatabase:
          name: classrpg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "10"
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Web Service
  - type: web
    name: classrpg-web
    runtime: static # 👈 Ajustado: para sites estáticos no Render, o runtime é "static"
    region: oregon
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist # 👈 Ajustado: Como o rootDir já é "frontend", o caminho aqui é relativo a ele
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          name: classrpg-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true

# Database
databases:
  - name: classrpg-db
    databaseName: classrpg
    user: classrpg
    plan: free
    region: oregon