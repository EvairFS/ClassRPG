services:
  # Backend API Service
  - type: web
    name: classrpg-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: classrpg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "10"
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Web Service (Servidor dinâmico Node.js)
  - type: web # ⏪ Voltou para Web Service dinâmico
    name: classrpg-web
    runtime: node # ⏪ Rodando em ambiente Node.js
    region: oregon # ⏪ Agora a região faz sentido e é permitida!
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build # Ajuste aqui se o seu front tiver comando de build (como no Next.js)
    startCommand: npm start # O comando que inicia o seu servidor frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL # Se for Next.js/outro, mude o nome da variável se necessário
        fromService:
          name: classrpg-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true

# Database
databases:
  - name: classrpg-db
    databaseName: classrpg
    user: classrpg
    plan: free
    region: oregon

