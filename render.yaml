# Frontend Web Service (Ajustado para TanStack Start / Lovable)
  - type: web
    name: classrpg-web
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && npm run install:frontend -- --production=false && npm run build:frontend
    startCommand: npm run start:frontend
    envVars:
      - key: NODE_ENV
        value: production
      # 👇 LIMITADOR DE MEMÓRIA PARA O PLANO FREE DO RENDER DOIS DOIS LADOS (BUILD E START)
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: VITE_API_URL
        fromService:
          name: classrpg-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: API_URL
        fromService:
          name: classrpg-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_ALLOWED_HOSTS
        value: '["classrpg-web.onrender.com"]'
      - key: ALLOWED_HOSTS
        value: '["classrpg-web.onrender.com"]'
    autoDeploy: true